name: Auto-merge Backstage PRs
on:
  pull_request:
    types: [opened]

jobs:
  autommerge:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'backstage-auto-merge')
    steps:
      - name: Auto-merge
        uses: "pascalgn/automerge-action@v0.15.6"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_METHOD: "squash"