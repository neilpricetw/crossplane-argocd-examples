apiVersion: s3.aws.m.upbound.io/v1beta1
kind: Bucket
metadata:
  name: ${{ .Values.bucketName }}
  namespace: default
spec:
  forProvider:
    region: ${{ .Values.region }}
    forceDestroy: true
    tags:
      Environment: ${{ .Values.environment }}
      ManagedBy: Crossplane    
  providerConfigRef:
    name: default
    kind: ClusterProviderConfig