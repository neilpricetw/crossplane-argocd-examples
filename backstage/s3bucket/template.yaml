apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: s3-bucket-template
  title: S3 Bucket (Crossplane)
  description: Provision a secure AWS S3 bucket using Helm and Crossplane.
spec:
  owner: guests
  type: infrastructure

  parameters:
    - title: Bucket Configuration
      required: [bucketName, owner, region, environment]
      properties:
        bucketName:
          title: Bucket Name
          type: string
          description: Must be globally unique.
          ui:autofocus: true
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
        region:
          title: AWS Region
          type: string
          default: ap-southeast-1
          enum: [us-east-1, ap-southeast-1]
        environment:
          title: Environment
          type: string
          default: dev
          enum: [dev, test, prod]

  steps:
    - id: fetch-base
      name: Render Helm Chart
      action: fetch:template
      input:
        url: ./skeleton
        values:
          bucketName: ${{ parameters.bucketName }}
          owner: ${{ parameters.owner }}
          region: ${{ parameters.region }}
          environment: ${{ parameters.environment }}
        targetPath: "argocd/s3-buckets/${{ parameters.bucketName }}"              

    - id: clone-gitops
      action: git:clone
      input:
        url: "github.com?owner=neilpricetw&repo=crossplane-argocd-examples"
        branch: main

    - id: push-changes
      action: git:push
      input:
        branch: main
        commitMessage: "feat: add s3 bucket ${{ parameters.bucketName }}"            
        