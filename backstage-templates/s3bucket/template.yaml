apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: s3-bucket-template
  title: S3 Bucket (Crossplane)
  description: Provision a secure AWS S3 bucket using Helm and Crossplane.
spec:
  owner: guests
  type: infrastructure

  parameters:
    - title: Bucket Configuration
      required: [bucketName, owner, region, environment]
      properties:
        bucketName:
          title: Bucket Name
          type: string
          description: Must be globally unique.
          ui:autofocus: true
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
        region:
          title: AWS Region
          type: string
          default: ap-southeast-2
          enum: [us-east-1, ap-southeast-1, ap-southeast-2]
        environment:
          title: Environment
          type: string
          default: dev
          enum: [dev, test, prod]
        systemName:
          title: System
          type: string
          description: The system this bucket belongs to (e.g., 'order-management')
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - System          

  steps:
    - id: fetch-base
      name: Render Helm Chart
      action: fetch:template
      input:
        url: ./skeleton
        values:
          bucketName: ${{ parameters.bucketName }}
          owner: ${{ parameters.owner }}
          region: ${{ parameters.region }}
          environment: ${{ parameters.environment }}
          systemName: ${{ parameters.systemName }}          
        targetPath: "argocd/resources/backstage-s3buckets"          

    - id: publish
      name: Create Pull Request in GitOps Repo
      action: publish:github:pull-request
      input:
        repoUrl: "github.com?owner=neilpricetw&repo=argocd-resources"
        branchName: "automerge/s3-${{ parameters.bucketName }}"
        title: "Add S3 Bucket: ${{ parameters.bucketName }}"
        description: |
          This PR was generated by Backstage.
          Provisioning S3 Bucket: **${{ parameters.bucketName }}**
          Owned by: **${{ parameters.owner }}**
        