apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: default-region-config
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime 
              env:
                - name: AWS_REGION
                  value: ap-southeast-2
                - name: AWS_DEFAULT_REGION
                  value: ap-southeast-2
          serviceAccountName: "crossplane-provider-aws"
